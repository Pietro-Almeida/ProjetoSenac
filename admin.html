<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo - AMAS</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- CABEÇALHO -->
<header class="header">

  <div class="logo">
    <img src="logo.png" alt="Logo AMAS">
  </div>

  <nav class="menu">
    <a href="#dashboard">Dashboard</a>
    <a href="#associados">Associados</a>
    <a href="#pagamentos">Pagamentos</a>
    <a href="#relatorios">Relatórios</a>
    <a href="#graficos">Gráficos</a>
  </nav>

  <div class="login-menu">
    <button id="toggle-theme">🌙</button>
    <button class="btn-login">Administrador</button>
  </div>

</header>

<!-- DASHBOARD -->
<section id="dashboard" class="container">
<h1>Painel Administrativo</h1>

<div class="cards-dashboard">

<div class="card">
<h3>Total de Associados</h3>
<p>120</p>
</div>

<div class="card">
<h3>Pagamentos do mês</h3>
<p>R$ 3.500</p>
</div>

<div class="card">
<h3>Contribuições</h3>
<p>85 registradas</p>
</div>

<div class="card">
<h3>Relatórios gerados</h3>
<p>12</p>
</div>

</div>
</section>

<!-- ASSOCIADOS -->
<section id="associados" class="container">

<h2>Gerenciar Associados</h2>

<!-- PESQUISAR CPF -->
<div class="pesquisa">
<label>Pesquisar por CPF</label>
<input type="text" placeholder="Digite o CPF">
<button>Pesquisar</button>
</div>

<!-- CADASTRO -->
<h3>Cadastrar Novo Associado</h3>

<form class="form-admin">

<label>Nome</label>
<input type="text" placeholder="Nome completo">

<label>CPF</label>
<input type="text" placeholder="000.000.000-00">

<label>Email</label>
<input type="email" placeholder="Email">

<label>Telefone</label>
<input type="tel" placeholder="Telefone">
