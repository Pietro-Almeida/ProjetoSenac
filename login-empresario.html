<!DOCTYPE html>
<html lang="pt-br">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>AMAS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
  <div class="logo">
    <img src="img/amas.png" alt="Logo AMAS">
  </div>

  <nav class="menu">
    <a href="index.html">Início</a>
    <a href="#sobre">Sobre</a>
    <a href="#beneficios">Benefícios</a>
    <a href="#contato">Contato</a>
  </nav>

  <div class="login-menu">
    <button id="toggle-theme">🌙</button>
    <button class="btn-login">Login</button>
    <div class="login-opcoes">
      <a href="login-admin.html">Administrador</a>
      <a href="login-associado.html">Associado</a>
      <a href="login-empresario.html">Empresário</a>

    <!-- 🔧 OK -->
    <input type="text" id="cnpj" placeholder="Digite seu CNPJ">

    <!-- 🔧 ERRO: evitar usar id "senha" igual ao admin -->
    <input type="password" id="senhaEmpresario" placeholder="Digite sua senha">

    <button id="loginEmpresario">Entrar</button>
  </div>

<script type="module" src="js/main.js"></script>
